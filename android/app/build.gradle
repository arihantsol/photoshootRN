apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

react {
  entryFile = file(["node", "--print", "require.resolve('react-native/package.json') + '/../index.android.js'"].execute(null, rootDir).text.trim())
  cliFile = file(["node", "--print", "require.resolve('react-native/package.json') + '/../cli.js'"].execute(null, rootDir).text.trim())
  hermesCommand = file(["node", "--print", "require.resolve('hermes-engine/package.json') + '/../build/Release/hermesc'"].execute(null, rootDir).text.trim())
}

android {
  compileSdkVersion 33
  defaultConfig {
    applicationId "com.photoshootgenerator"
    minSdkVersion 21
    targetSdkVersion 33
    versionCode 1
    versionName "1.0"
    vectorDrawables.useSupportLibrary true
  }

  buildTypes {
    release {
      signingConfig signingConfigs.debug
      minifyEnabled enableProguardInReleaseBuilds
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }
}

dependencies {
  implementation fileTree(dir: "libs", include: ["*.jar"])
  implementation 'com.facebook.react:react-native:0.72.0'
  implementation 'com.facebook.soloader:soloader:0.10.4'
}
